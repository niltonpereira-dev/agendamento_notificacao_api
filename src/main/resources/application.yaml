spring:
  application:
    name: agendamento-notificacao-api

  datasource:
    url: jdbc:postgresql://localhost:5432/db_agendamento
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect